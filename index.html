<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>عيد سعيد يا جنا يحبيبتي❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#ff2d75 0%,#190014 45%,#000 100%);
position:relative;
}

/* الخلفية */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
url('https://i.imgur.com/6Iej2c3.png');
opacity:.15;
animation: floatBg 20s linear infinite;
}

@keyframes floatBg{
0%{transform:translateY(0);}
100%{transform:translateY(-200px);}
}

.container{
position:relative;
z-index:2;
text-align:center;
width:90%;
max-width:420px;
}

/* الصورة */
.photo{
width:100%;
border-radius:30px;
overflow:hidden;
cursor:pointer;
position:relative;
transition:.5s;
box-shadow:
0 0 30px rgba(255,0,100,.6),
0 0 60px rgba(255,0,100,.3);
}

.photo:hover{
transform:scale(1.03);
}

.photo img{
width:100%;
display:block;
}

/* تأثير الجلو */
.photo::after{
content:"❤";
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:70px;
height:70px;
border-radius:50%;
background:#ff2d75;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
color:white;
box-shadow:0 0 25px #ff2d75;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.1);}
100%{transform:translateX(-50%) scale(1);}
}

/* النص */
.message{
margin-top:30px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
color:white;
font-size:30px;
font-weight:700;
line-height:1.8;
opacity:0;
transform:translateY(40px);
transition:1s;
box-shadow:0 0 30px rgba(255,0,120,.25);
}

.message.show{
opacity:1;
transform:translateY(0);
}

.message span{
display:block;
margin-top:15px;
font-size:38px;
color:#ff7eb3;
font-weight:900;
text-shadow:0 0 15px #ff2d75;
}

/* قلوب متحركة */

.hearts{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
top:0;
left:0;
pointer-events:none;
}

.heart{
position:absolute;
bottom:-50px;
color:#ff4f8b;
font-size:20px;
animation: rise linear infinite;
opacity:.7;
}

@keyframes rise{
0%{
transform:translateY(0) scale(1);
opacity:0;
}
30%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.8);
opacity:0;
}
}

.title{
color:white;
font-size:55px;
margin-bottom:25px;
font-weight:900;
text-shadow:0 0 20px #ff2d75;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 15px #ff2d75;
}
to{
text-shadow:0 0 35px #ff9dc5;
}
}

.click{
margin-top:15px;
color:#ffd2e3;
font-size:20px;
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">

<div class="title">
عيد سعيد ❤️
</div>

<div class="photo" onclick="showMessage()">

<!-- حط صورتك هنا -->
<img src="photo.jpg" alt="photo">

</div>

<div class="click">
اضغطي على الصورة ✨
</div>

<div class="message" id="msg">

كل سنه وانت طيبه يحبيبي  
وعيد سعيد عليك وينعاد عليكي  
وانتي ف بيتي ان شاء الله  
وحشتيني اوي...

<span>بحبك اوي ❤️❤️</span>

</div>

</div>

<script>

function showMessage(){
document.getElementById("msg").classList.toggle("show");
}

/* القلوب */

const hearts = document.querySelector(".hearts");

setInterval(() => {

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "❤";

heart.style.left = Math.random() * 100 + "%";

heart.style.animationDuration =
(4 + Math.random() * 6) + "s";

heart.style.fontSize =
(15 + Math.random() * 25) + "px";

hearts.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

},300);

</script>

</body>
</html>
